<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goals — RSRC Board</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .page-wrap { max-width: 800px; margin: 0 auto; padding: 32px 24px; }

    .page-header-bar {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
      padding: 28px 0 24px;
      border-bottom: 1px solid #e2e1dd;
      margin-bottom: 28px;
    }
    .page-title { font-family: 'DM Sans', sans-serif; font-size: 22px; font-weight: 800; color: #111; letter-spacing: -.03em; }
    .page-sub   { font-size: 12.5px; color: #999; margin-top: 3px; }

    .add-btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 16px;
      background: #2a5c23; color: #fff;
      border: none; border-radius: 6px;
      font-size: 13.5px; font-weight: 600;
      cursor: pointer; transition: all .15s;
      font-family: inherit;
    }
    .add-btn:hover { background: #3a7a30; box-shadow: 0 2px 8px rgba(42,92,35,.25); }
    .add-btn svg { width: 15px; height: 15px; }

    .section-label {
      font-size: 10.5px; font-weight: 700; letter-spacing: .12em;
      text-transform: uppercase; color: #bbb; margin-bottom: 14px;
    }

    .goal-card {
      background: #fff;
      border: 1px solid #e2e1dd;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 1px 3px rgba(0,0,0,.04);
      transition: all .15s;
    }
    .goal-card:hover { border-color: #d0cfc9; box-shadow: 0 4px 14px rgba(0,0,0,.07); }
    .goal-card.is-completed { opacity: 0.6; border-color: #c5dfc2; background: #fafff9; }

    .goal-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
    .goal-title  { font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 15px; color: #111; }
    .goal-desc   { font-size: 12.5px; color: #999; margin-top: 3px; line-height: 1.5; }

    .progress-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .progress-pct { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700; color: #2a5c23; min-width: 36px; text-align: right; }

    .subgoal-item {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 10px;
      border-radius: 6px;
      transition: background .12s;
    }
    .subgoal-item:hover { background: #f7f6f2; }
    .subgoal-text { font-size: 13px; color: #333; flex: 1; }
    .subgoal-text.done { text-decoration: line-through; color: #bbb; }
    .subgoal-del {
      background: none; border: none; cursor: pointer;
      color: #ddd; opacity: 0; transition: all .15s;
      padding: 2px; display: flex; align-items: center;
    }
    .subgoal-item:hover .subgoal-del { opacity: 1; }
    .subgoal-del:hover { color: #b81c1c; }

    .goal-actions { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; margin-top: 14px; }
    .action-btn {
      font-size: 12px; font-weight: 600;
      padding: 6px 13px; border-radius: 5px;
      cursor: pointer; transition: all .15s;
      font-family: inherit; border: 1px solid;
    }
    .action-btn-sub  { background: #f7f6f2; color: #555; border-color: #e2e1dd; }
    .action-btn-sub:hover  { background: #f0efeb; border-color: #d0cfc9; }
    .action-btn-done { background: #edf5eb; color: #2a5c23; border-color: #c5dfc2; }
    .action-btn-done:hover { background: #dceeda; }
    .action-btn-reopen { background: #f7f6f2; color: #777; border-color: #e2e1dd; }
    .action-btn-reopen:hover { background: #f0efeb; }
    .action-btn-del {
      background: none; border: none; cursor: pointer;
      color: #ddd; transition: color .15s; padding: 4px;
      margin-left: auto; display: flex; align-items: center;
    }
    .action-btn-del:hover { color: #b81c1c; }

    /* Modal */
    .modal-save-btn {
      width: 100%; padding: 10px;
      background: #2a5c23; color: #fff;
      border: none; border-radius: 6px;
      font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all .15s;
      font-family: inherit; margin-top: 4px;
    }
    .modal-save-btn:hover { background: #3a7a30; }
    .modal-save-btn.green-sm {
      width: auto; padding: 8px 18px; font-size: 13.5px;
    }
    .modal-close {
      background: none; border: none; cursor: pointer;
      color: #bbb; transition: color .15s;
    }
    .modal-close:hover { color: #111; }
    .add-sub-link {
      background: none; border: none; cursor: pointer;
      font-size: 13px; color: #999; transition: color .15s;
      display: flex; align-items: center; gap: 5px;
      font-family: inherit; padding: 4px 0;
    }
    .add-sub-link:hover { color: #2a5c23; }
    .subgoal-input-row { display: flex; align-items: center; gap: 8px; }
    .remove-sub-btn {
      background: none; border: none; cursor: pointer;
      color: #ccc; transition: color .15s; flex-shrink: 0;
    }
    .remove-sub-btn:hover { color: #b81c1c; }
  </style>
</head>
<body style="min-height:100vh;display:flex;flex-direction:column;background:#f0efeb">
  <header id="app-nav" class="sticky top-0 z-50"></header>

  <main class="flex-1">
    <div class="page-wrap">

      <!-- Header -->
      <div class="page-header-bar">
        <div>
          <div class="page-title">Season Goals</div>
          <div class="page-sub">Track board objectives and milestones</div>
        </div>
        <button class="add-btn" onclick="openCreateGoalModal()">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          New Goal
        </button>
      </div>

      <!-- Active goals -->
      <div class="section-label">Active</div>
      <div id="active-goals" style="display:flex;flex-direction:column;gap:12px;margin-bottom:8px"></div>
      <div id="goals-empty" class="hidden" style="text-align:center;padding:52px 0;color:#bbb">
        <svg style="width:44px;height:44px;margin:0 auto 12px;opacity:.35" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        <p style="font-family:'DM Sans',sans-serif;font-weight:700;font-size:15px;color:#bbb">No active goals</p>
        <p style="font-size:13px;color:#ccc;margin-top:4px">Set a goal to get the season moving</p>
      </div>

      <!-- Completed goals -->
      <div id="completed-section" class="hidden" style="margin-top:36px">
        <div class="section-label" style="margin-bottom:14px">Completed</div>
        <div id="completed-goals" style="display:flex;flex-direction:column;gap:12px"></div>
      </div>
    </div>
  </main>

  <!-- Create goal modal -->
  <div id="goal-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <h3 style="font-family:'DM Sans',sans-serif;font-size:17px;font-weight:700;color:#111">New Goal</h3>
        <button class="modal-close" onclick="closeModal('goal-modal')">
          <svg style="width:18px;height:18px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div>
          <label class="form-label">Goal title *</label>
          <input id="goal-title" class="form-input" placeholder="Win the university league…">
        </div>
        <div>
          <label class="form-label">Description</label>
          <textarea id="goal-desc" rows="2" class="form-input" style="resize:none" placeholder="Background and context…"></textarea>
        </div>
        <div>
          <label class="form-label">Owner</label>
          <select id="goal-owner" class="form-input">
            <option value="master">All Members</option>
          </select>
        </div>
        <div>
          <label class="form-label">Sub-goals / Milestones</label>
          <div id="subgoal-inputs" style="display:flex;flex-direction:column;gap:7px;margin-bottom:8px"></div>
          <button class="add-sub-link" onclick="addSubgoalInput()" type="button">
            <svg style="width:13px;height:13px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            Add sub-goal
          </button>
        </div>
        <button class="modal-save-btn" onclick="saveGoal()">Create Goal</button>
      </div>
    </div>
  </div>

  <!-- Add sub-goal modal -->
  <div id="subgoal-modal" class="modal-overlay hidden">
    <div class="modal-box" style="max-width:380px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <h3 style="font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;color:#111">Add Sub-goal</h3>
        <button class="modal-close" onclick="closeModal('subgoal-modal')">
          <svg style="width:16px;height:16px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <input id="new-subgoal-text" class="form-input" placeholder="Sub-goal description…" style="margin-bottom:12px">
      <button id="save-subgoal-btn" class="modal-save-btn">Add Sub-goal</button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/goals.js"></script>
</body>
</html>
