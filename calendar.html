<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar — RSRC Board</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .page-wrap { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
    .section-title { font-size: 10.5px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: #bbb; margin-bottom: 14px; }
    .month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }

    .upcoming-card { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #fff; border: 1px solid #e2e1dd; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.04); transition: all .15s; }
    .upcoming-card:hover { border-color: #d0cfc9; box-shadow: 0 3px 10px rgba(0,0,0,.07); }
    .upcoming-title { font-weight: 600; font-size: 13.5px; color: #111; }
    .upcoming-meta  { font-size: 12px; color: #999; margin-top: 2px; }

    .page-header-bar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; padding: 28px 0 24px; border-bottom: 1px solid #e2e1dd; margin-bottom: 28px; }
    .page-title { font-family: 'DM Sans', sans-serif; font-size: 22px; font-weight: 800; color: #111; letter-spacing: -.03em; }
    .page-sub   { font-size: 12.5px; color: #999; margin-top: 3px; }

    .add-btn { display: inline-flex; align-items: center; gap: 7px; padding: 8px 16px; background: #2a5c23; color: #fff; border: none; border-radius: 6px; font-size: 13.5px; font-weight: 600; cursor: pointer; transition: all .15s; font-family: inherit; }
    .add-btn:hover { background: #3a7a30; box-shadow: 0 2px 8px rgba(42,92,35,.25); }
    .add-btn svg { width: 15px; height: 15px; }

    .google-btn { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; background: #fff; color: #333; border: 1px solid #e2e1dd; border-radius: 6px; font-size: 13.5px; font-weight: 600; cursor: pointer; transition: all .15s; font-family: inherit; }
    .google-btn:hover { border-color: #4285f4; box-shadow: 0 2px 8px rgba(66,133,244,.15); }
    .google-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .google-btn-disconnect { display: none; align-items: center; gap: 8px; padding: 8px 16px; background: #e8f0fe; color: #4285f4; border: 1px solid #c5d5fb; border-radius: 6px; font-size: 13.5px; font-weight: 600; cursor: pointer; transition: all .15s; font-family: inherit; }
    .google-btn-disconnect:hover { background: #d2e3fc; }
    .google-sync-status { display: none; align-items: center; gap: 6px; font-size: 12px; color: #4285f4; font-weight: 500; }

    .event-bar { display: flex; align-items: center; padding: 2px 5px; border-radius: 3px; margin: 1px 0; overflow: hidden; }
    .event-bar-label { font-size: 10.5px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .edit-btn { background: none; border: none; cursor: pointer; color: #bbb; transition: color .15s; padding: 2px; }
    .edit-btn:hover { color: #2a5c23; }
    .delete-btn { background: none; border: none; cursor: pointer; color: #ccc; transition: color .15s; padding: 2px; flex-shrink: 0; }
    .delete-btn:hover { color: #b81c1c; }

    .day-event-row { display: flex; gap: 10px; padding: 12px 14px; background: #f7f6f2; border: 1px solid #e2e1dd; border-radius: 7px; align-items: flex-start; }
    .day-event-title { font-weight: 600; font-size: 13.5px; color: #111; }
    .day-event-meta  { font-size: 12px; color: #999; margin-top: 2px; }

    .modal-save-btn { width: 100%; padding: 10px; background: #2a5c23; color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .15s; font-family: inherit; margin-top: 4px; }
    .modal-save-btn:hover { background: #3a7a30; }
    .modal-dashed-btn { width: 100%; padding: 9px; background: transparent; border: 1.5px dashed #e2e1dd; border-radius: 6px; font-size: 13px; color: #bbb; cursor: pointer; transition: all .15s; font-family: inherit; }
    .modal-dashed-btn:hover { border-color: #2a5c23; color: #2a5c23; }
    .modal-close { background: none; border: none; cursor: pointer; color: #bbb; transition: color .15s; padding: 2px; }
    .modal-close:hover { color: #111; }

    .allday-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; }
    .allday-row input[type="checkbox"] { width: 15px; height: 15px; accent-color: #2a5c23; cursor: pointer; }
    .allday-row label { font-size: 13.5px; font-weight: 500; color: #333; cursor: pointer; }
  </style>
</head>
<body style="min-height:100vh;display:flex;flex-direction:column">
  <header id="app-nav" class="sticky top-0 z-50"></header>

  <main class="flex-1">
    <div class="page-wrap">

      <!-- Header -->
      <div class="page-header-bar">
        <div>
          <div class="page-title">Calendar</div>
          <div class="page-sub">Board events, matches & training sessions</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <div id="google-sync-status" class="google-sync-status">
            <span style="width:7px;height:7px;border-radius:50%;background:#4285f4;display:inline-block"></span>
            Google Calendar synced
          </div>
          <button id="google-sync-btn" class="google-btn" onclick="handleGoogleSignIn()" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Connect Google Calendar
          </button>
          <button id="google-signout-btn" class="google-btn-disconnect" onclick="handleGoogleSignOut()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
            Disconnect
          </button>
          <div style="display:flex;gap:4px">
            <button data-filter="all"    class="filter-pill active">All</button>
            <button data-filter="mine"   class="filter-pill">Mine</button>
            <button data-filter="master" class="filter-pill">Team</button>
          </div>
          <button class="add-btn" onclick="openCreateEventModal(null)">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            Add Event
          </button>
        </div>
      </div>

      <!-- Month nav -->
      <div class="month-nav">
        <button onclick="prevMonth()" style="background:#fff;border:1px solid #e2e1dd;border-radius:6px;padding:6px;cursor:pointer;color:#666;display:flex;align-items:center;transition:all .15s" onmouseover="this.style.borderColor='#d0cfc9'" onmouseout="this.style.borderColor='#e2e1dd'">
          <svg style="width:18px;height:18px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </button>
        <h2 id="month-label" style="font-family:'DM Sans',sans-serif;font-size:17px;font-weight:700;color:#111;letter-spacing:-.02em"></h2>
        <button onclick="nextMonth()" style="background:#fff;border:1px solid #e2e1dd;border-radius:6px;padding:6px;cursor:pointer;color:#666;display:flex;align-items:center;transition:all .15s" onmouseover="this.style.borderColor='#d0cfc9'" onmouseout="this.style.borderColor='#e2e1dd'">
          <svg style="width:18px;height:18px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </button>
      </div>

      <!-- Calendar grid -->
      <div id="cal-grid" class="cal-grid" style="margin-bottom:36px"></div>

      <!-- Upcoming -->
      <div class="section-title">Upcoming events</div>
      <div id="upcoming-list" style="display:flex;flex-direction:column;gap:8px"></div>
    </div>
  </main>

  <!-- Day modal -->
  <div id="day-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
        <h3 id="day-modal-title" style="font-family:'DM Sans',sans-serif;font-size:17px;font-weight:700;color:#111"></h3>
        <button class="modal-close" onclick="closeModal('day-modal')">
          <svg style="width:18px;height:18px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="day-events-list" style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px"></div>
      <button id="day-add-btn" class="modal-dashed-btn">+ Add event this day</button>
    </div>
  </div>

  <!-- Create / Edit event modal -->
  <div id="event-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <h3 id="event-modal-title" style="font-family:'DM Sans',sans-serif;font-size:17px;font-weight:700;color:#111">New Event</h3>
        <button class="modal-close" onclick="closeModal('event-modal')">
          <svg style="width:18px;height:18px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div>
          <label class="form-label">Title *</label>
          <input id="ev-title" class="form-input" placeholder="Match vs. Erasmus…">
        </div>
        <div>
          <label class="form-label">Start date *</label>
          <input id="ev-date" type="date" class="form-input">
        </div>

        <!-- All-day checkbox -->
        <div class="allday-row">
          <input type="checkbox" id="ev-allday" onchange="toggleAllDay()">
          <label for="ev-allday">Full day event</label>
        </div>

        <!-- End date (only shown for full-day events) -->
        <div id="ev-enddate-row" style="display:none">
          <label class="form-label">End date <span style="color:#bbb;font-weight:400">(optional, for multi-day events)</span></label>
          <input id="ev-enddate" type="date" class="form-input">
        </div>

        <!-- Time fields (hidden when all-day) -->
        <div id="ev-time-fields" style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div>
            <label class="form-label">Start time</label>
            <input id="ev-start" type="time" class="form-input">
          </div>
          <div>
            <label class="form-label">End time</label>
            <input id="ev-end" type="time" class="form-input">
          </div>
        </div>

        <div>
          <label class="form-label">Location</label>
          <input id="ev-location" class="form-input" placeholder="Sportcomplex Woudestein…">
        </div>
        <div>
          <label class="form-label">Owner / Organiser</label>
          <select id="ev-owner" class="form-input"></select>
        </div>
        <div>
          <label class="form-label">Description</label>
          <textarea id="ev-desc" rows="3" class="form-input" style="resize:none" placeholder="Additional details…"></textarea>
        </div>
        <button class="modal-save-btn" onclick="saveEvent()">Save Event</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/calendar.js"></script>
  <script src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
  <script src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>
</html>
