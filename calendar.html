<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar — RSRC Board</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .page-wrap { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
    .section-title {
      font-size: 10.5px; font-weight: 700; letter-spacing: .12em;
      text-transform: uppercase; color: #bbb; margin-bottom: 14px;
    }
    .month-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .upcoming-card {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      background: #fff;
      border: 1px solid #e2e1dd;
      border-radius: 8px;
      box-shadow: 0 1px 3px rgba(0,0,0,.04);
      transition: all .15s;
    }
    .upcoming-card:hover { border-color: #d0cfc9; box-shadow: 0 3px 10px rgba(0,0,0,.07); }
    .upcoming-title { font-weight: 600; font-size: 13.5px; color: #111; }
    .upcoming-meta  { font-size: 12px; color: #999; margin-top: 2px; }

    /* Page header bar */
    .page-header-bar {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
      padding: 28px 0 24px;
      border-bottom: 1px solid #e2e1dd;
      margin-bottom: 28px;
    }
    .page-title { font-family: 'DM Sans', sans-serif; font-size: 22px; font-weight: 800; color: #111; letter-spacing: -.03em; }
    .page-sub   { font-size: 12.5px; color: #999; margin-top: 3px; }

    .add-btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 16px;
      background: #2a5c23; color: #fff;
      border: none; border-radius: 6px;
      font-size: 13.5px; font-weight: 600;
      cursor: pointer; transition: all .15s;
      font-family: inherit;
    }
    .add-btn:hover { background: #3a7a30; box-shadow: 0 2px 8px rgba(42,92,35,.25); }
    .add-btn svg { width: 15px; height: 15px; }

    /* Modal inner adjustments */
    .modal-box .text-white { color: #111 !important; }
    .modal-box .bg-gray-800 { background: #f7f6f2 !important; border-color: #e2e1dd !important; }
    .modal-box .border-gray-700 { border-color: #e2e1dd !important; }
    .day-event-row {
      display: flex; gap: 10px; padding: 12px 14px;
      background: #f7f6f2; border: 1px solid #e2e1dd;
      border-radius: 7px; align-items: flex-start;
    }
    .day-event-title { font-weight: 600; font-size: 13.5px; color: #111; }
    .day-event-meta  { font-size: 12px; color: #999; margin-top: 2px; }
    .delete-btn {
      background: none; border: none; cursor: pointer;
      color: #ccc; transition: color .15s; padding: 2px; flex-shrink: 0;
    }
    .delete-btn:hover { color: #b81c1c; }
    .modal-save-btn {
      width: 100%; padding: 10px;
      background: #2a5c23; color: #fff;
      border: none; border-radius: 6px;
      font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all .15s;
      font-family: inherit; margin-top: 4px;
    }
    .modal-save-btn:hover { background: #3a7a30; }
    .modal-dashed-btn {
      width: 100%; padding: 9px;
      background: transparent;
      border: 1.5px dashed #e2e1dd;
      border-radius: 6px;
      font-size: 13px; color: #bbb;
      cursor: pointer; transition: all .15s;
      font-family: inherit;
    }
    .modal-dashed-btn:hover { border-color: #2a5c23; color: #2a5c23; }
    .modal-close {
      background: none; border: none; cursor: pointer;
      color: #bbb; transition: color .15s; padding: 2px;
    }
    .modal-close:hover { color: #111; }
  </style>
</head>
<body style="min-height:100vh;display:flex;flex-direction:column">
  <header id="app-nav" class="sticky top-0 z-50"></header>

  <main class="flex-1">
    <div class="page-wrap">

      <!-- Header -->
      <div class="page-header-bar">
        <div>
          <div class="page-title">Calendar</div>
          <div class="page-sub">Board events, matches & training sessions</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <div style="display:flex;gap:4px">
            <button data-filter="all"    class="filter-pill active">All</button>
            <button data-filter="mine"   class="filter-pill">Mine</button>
            <button data-filter="master" class="filter-pill">Team</button>
          </div>
          <button class="add-btn" onclick="openCreateEventModal(null)">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            Add Event
          </button>
        </div>
      </div>

      <!-- Month nav -->
      <div class="month-nav">
        <button onclick="prevMonth()" style="background:#fff;border:1px solid #e2e1dd;border-radius:6px;padding:6px;cursor:pointer;color:#666;display:flex;align-items:center;transition:all .15s" onmouseover="this.style.borderColor='#d0cfc9'" onmouseout="this.style.borderColor='#e2e1dd'">
          <svg style="width:18px;height:18px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </button>
        <h2 id="month-label" style="font-family:'DM Sans',sans-serif;font-size:17px;font-weight:700;color:#111;letter-spacing:-.02em"></h2>
        <button onclick="nextMonth()" style="background:#fff;border:1px solid #e2e1dd;border-radius:6px;padding:6px;cursor:pointer;color:#666;display:flex;align-items:center;transition:all .15s" onmouseover="this.style.borderColor='#d0cfc9'" onmouseout="this.style.borderColor='#e2e1dd'">
          <svg style="width:18px;height:18px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </button>
      </div>

      <!-- Calendar grid -->
      <div id="cal-grid" class="cal-grid" style="margin-bottom:36px"></div>

      <!-- Upcoming -->
      <div class="section-title">Upcoming events</div>
      <div id="upcoming-list" style="display:flex;flex-direction:column;gap:8px"></div>
    </div>
  </main>

  <!-- Day modal -->
  <div id="day-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
        <h3 id="day-modal-title" style="font-family:'DM Sans',sans-serif;font-size:17px;font-weight:700;color:#111"></h3>
        <button class="modal-close" onclick="closeModal('day-modal')">
          <svg style="width:18px;height:18px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="day-events-list" style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px"></div>
      <button id="day-add-btn" class="modal-dashed-btn">+ Add event this day</button>
    </div>
  </div>

  <!-- Create event modal -->
  <div id="event-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <h3 style="font-family:'DM Sans',sans-serif;font-size:17px;font-weight:700;color:#111">New Event</h3>
        <button class="modal-close" onclick="closeModal('event-modal')">
          <svg style="width:18px;height:18px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div>
          <label class="form-label">Title *</label>
          <input id="ev-title" class="form-input" placeholder="Match vs. Erasmus…">
        </div>
        <div>
          <label class="form-label">Date *</label>
          <input id="ev-date" type="date" class="form-input">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div>
            <label class="form-label">Start time</label>
            <input id="ev-start" type="time" class="form-input">
          </div>
          <div>
            <label class="form-label">End time</label>
            <input id="ev-end" type="time" class="form-input">
          </div>
        </div>
        <div>
          <label class="form-label">Location</label>
          <input id="ev-location" class="form-input" placeholder="Sportcomplex Woudestein…">
        </div>
        <div>
          <label class="form-label">Owner / Organiser</label>
          <select id="ev-owner" class="form-input"></select>
        </div>
        <div>
          <label class="form-label">Description</label>
          <textarea id="ev-desc" rows="3" class="form-input" style="resize:none" placeholder="Additional details…"></textarea>
        </div>
        <button class="modal-save-btn" onclick="saveEvent()">Save Event</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/calendar.js"></script>
</body>
</html>
